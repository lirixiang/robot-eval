# robot-eval platform (FastAPI backend + frontend)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: robot-eval-platform
  namespace: robot-eval
spec:
  replicas: 1
  selector:
    matchLabels:
      app: robot-eval-platform
  template:
    metadata:
      labels:
        app: robot-eval-platform
    spec:
      containers:
      - name: platform
        image: robot-eval-platform:latest
        command: ["uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8000"]
        ports:
        - containerPort: 8000
        env:
        - name: RAY_ADDRESS
          value: "ray://ray-head-svc.robot-eval.svc:10001"
        - name: DATABASE_URL
          value: "postgresql://eval:$(DB_PASSWORD)@postgres-svc.robot-eval.svc:5432/robot_eval"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: robot-eval-secrets
              key: db-password
        - name: SCHEDULER_BACKEND
          value: "ray"
        - name: EVAL_ACTOR_MODULE
          value: "arena_actor"
        - name: EVAL_ACTOR_CLASS
          value: "IsaacLabArenaActor"
        resources:
          requests:
            cpu: "1"
            memory: "2Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: robot-eval-svc
  namespace: robot-eval
spec:
  type: NodePort
  selector:
    app: robot-eval-platform
  ports:
  - port: 8000
    targetPort: 8000
    nodePort: 30080
---
# Optional: Ingress for external access
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: robot-eval-ingress
  namespace: robot-eval
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
spec:
  rules:
  - host: eval.your-domain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: robot-eval-svc
            port:
              number: 8000
