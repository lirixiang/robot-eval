apiVersion: v1
kind: Namespace
metadata:
  name: robot-eval
---
# ── PostgreSQL ────────────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: robot-eval
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: robot-eval
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        env:
        - name: POSTGRES_DB
          value: robot_eval
        - name: POSTGRES_USER
          value: eval
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: robot-eval-secrets
              key: db-password
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-svc
  namespace: robot-eval
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
