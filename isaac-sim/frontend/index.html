<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Isaac Sim Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'Courier New', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 0 16px;
      height: 44px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .logo { color: #76e4a7; font-weight: bold; font-size: 13px; letter-spacing: 1px; }

    #dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #484f58; flex-shrink: 0;
      transition: background 0.3s;
    }
    #dot.live { background: #3fb950; }
    #dot.waiting { background: #e3b341; animation: blink 1s infinite; }
    #dot.error { background: #f85149; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    #status { font-size: 12px; color: #8b949e; }
    .stats { margin-left: auto; display: flex; gap: 20px; font-size: 11px; }
    .stat { display: flex; gap: 5px; }
    .stat-label { color: #484f58; }
    .stat-val { color: #8b949e; }

    #viewport {
      flex: 1;
      position: relative;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #stream-canvas {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: none;
    }
    #placeholder {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      color: #484f58;
    }
    .ph-icon { font-size: 48px; opacity: 0.2; }
    .ph-text { font-size: 14px; }
    #spinner {
      width: 28px; height: 28px;
      border: 2px solid #30363d; border-top-color: #76e4a7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #log {
      background: #0d1117;
      border-top: 1px solid #21262d;
      height: 64px;
      overflow-y: auto;
      font-size: 11px;
      flex-shrink: 0;
      padding: 2px 0;
    }
    .lr { padding: 1px 12px; line-height: 1.7; }
    .lr .ts { color: #30363d; margin-right: 6px; }
    .lr.ok .m { color: #3fb950; }
    .lr.err .m { color: #f85149; }
    .lr.info .m { color: #8b949e; }
  </style>
</head>
<body>

<div id="header">
  <span class="logo">&#9632; ISAAC SIM</span>
  <div id="dot" class="waiting"></div>
  <span id="status">等待 Isaac Sim 就绪...</span>
  <div class="stats">
    <div class="stat"><span class="stat-label">FPS</span><span class="stat-val" id="s-fps">--</span></div>
    <div class="stat"><span class="stat-label">分辨率</span><span class="stat-val" id="s-res">--</span></div>
  </div>
</div>

<div id="viewport">
  <canvas id="stream-canvas"></canvas>
  <div id="placeholder">
    <div id="spinner"></div>
    <div class="ph-icon">&#11042;</div>
    <div class="ph-text" id="ph-text">等待 Isaac Sim 启动...</div>
  </div>
</div>

<div id="log"></div>

<script>
const HEALTH_URL  = '/health';
const STREAM_URL  = '/stream';
const POLL_MS     = 2000;

const $canvas = document.getElementById('stream-canvas');
const ctx     = $canvas.getContext('2d');
const $ph     = document.getElementById('placeholder');
const $phText = document.getElementById('ph-text');
const $dot    = document.getElementById('dot');
const $status = document.getElementById('status');

function log(msg, level = 'info') {
  const el = document.getElementById('log');
  const row = document.createElement('div');
  row.className = `lr ${level}`;
  const ts = new Date().toTimeString().slice(0, 8);
  row.innerHTML = `<span class="ts">[${ts}]</span><span class="m">${msg}</span>`;
  el.appendChild(row);
  el.scrollTop = el.scrollHeight;
  while (el.children.length > 100) el.removeChild(el.firstChild);
}

function setStatus(dotCls, text) {
  $dot.className = dotCls;
  $status.textContent = text;
}

// FPS counter
let frameCount = 0, lastTs = performance.now(), activeStream = null;

function countFps() {
  frameCount++;
  const now = performance.now();
  if (now - lastTs >= 1000) {
    document.getElementById('s-fps').textContent = Math.round(frameCount / ((now - lastTs) / 1000));
    frameCount = 0; lastTs = now;
  }
}

async function waitForHealth() {
  while (true) {
    try {
      const r = await fetch(HEALTH_URL, { signal: AbortSignal.timeout(1500) });
      if (r.ok) return;
    } catch {}
    await new Promise(r => setTimeout(r, POLL_MS));
  }
}

// Parse MJPEG multipart stream and draw each JPEG frame to canvas
async function streamMjpeg(abortSignal) {
  const resp = await fetch(STREAM_URL, { signal: abortSignal });
  const reader = resp.body.getReader();
  const boundary = '--frame';
  let buf = new Uint8Array(0);

  const SOI = new Uint8Array([0xFF, 0xD8]);
  const EOI = new Uint8Array([0xFF, 0xD9]);

  function concat(a, b) {
    const c = new Uint8Array(a.length + b.length);
    c.set(a); c.set(b, a.length); return c;
  }

  function indexOf(haystack, needle, from = 0) {
    outer: for (let i = from; i <= haystack.length - needle.length; i++) {
      for (let j = 0; j < needle.length; j++)
        if (haystack[i + j] !== needle[j]) continue outer;
      return i;
    }
    return -1;
  }

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf = concat(buf, value);

    // Find complete JPEG: SOI...EOI
    let start = indexOf(buf, SOI);
    while (start !== -1) {
      const end = indexOf(buf, EOI, start + 2);
      if (end === -1) break;
      const jpeg = buf.slice(start, end + 2);
      buf = buf.slice(end + 2);

      // Draw JPEG to canvas
      const blob = new Blob([jpeg], { type: 'image/jpeg' });
      const url  = URL.createObjectURL(blob);
      const img  = new Image();
      img.onload = () => {
        $canvas.width  = img.naturalWidth;
        $canvas.height = img.naturalHeight;
        ctx.drawImage(img, 0, 0);
        document.getElementById('s-res').textContent = `${img.naturalWidth}×${img.naturalHeight}`;
        URL.revokeObjectURL(url);
        countFps();
      };
      img.src = url;

      start = indexOf(buf, SOI);
    }
    // Keep buffer bounded
    if (buf.length > 500_000) buf = buf.slice(-100_000);
  }
}

function startStream() {
  const abort = new AbortController();
  activeStream = abort;

  log('开始 MJPEG 流', 'ok');
  setStatus('live', '已连接');
  $ph.style.display = 'none';
  $canvas.style.display = 'block';

  streamMjpeg(abort.signal).catch(err => {
    if (abort.signal.aborted) return;
    log(`流中断: ${err.message}`, 'err');
    setStatus('waiting', '重连中...');
    $canvas.style.display = 'none';
    $ph.style.display = 'flex';
    $phText.textContent = '重新连接...';
    setTimeout(startStream, 3000);
  });
}

async function main() {
  log('轮询健康接口...');
  await waitForHealth();
  log('Isaac Sim 就绪', 'ok');
  startStream();
}

main();
</script>
</body>
</html>
