services:
  # ── 评测平台（后端 API + 前端界面）────────────────────────────────────────
  platform:
    build:
      context: .
      dockerfile: Dockerfile
    image: robot-eval-platform:latest
    container_name: eval-platform
    network_mode: host
    volumes:
      - ./scripts:/app/scripts:ro
      - ./configs:/app/configs:ro
      - ./results:/app/results
      - ./backend:/app/backend  # 开发时热重载
    environment:
      - PYTHONPATH=/app:/app/backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # ── Isaac Sim（独立 GPU 容器）─────────────────────────────────────────────
  isaac-sim:
    image: nvcr.io/nvidia/isaac-sim:5.0.0
    container_name: eval-isaac-sim
    network_mode: host
    environment:
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-0}
      - NVIDIA_DRIVER_CAPABILITIES=all
      - ACCEPT_EULA=Y
      - PRIVACY_CONSENT=Y
    volumes:
      - /home/disk/ssl/isaac-sim5.0/cache/ov:/root/.cache/ov
      - /home/disk/ssl/isaac-sim5.0/cache/kit:/isaac-sim/kit/cache
      - /home/disk/ssl/isaac-sim5.0/cache/glcache:/root/.cache/nvidia/GLCache
      - /home/disk/ssl/isaac-sim5.0/cache/pip:/root/.cache/pip
      - /home/disk/ssl/isaac-sim5.0/cache/computecache:/root/.nv/ComputeCache
      - /home/disk/ssl/isaac-sim5.0/data:/root/.local/share/ov/data
      - /home/disk/ssl/isaac-sim5.0/pkg:/root/.local/share/ov/pkg
      - /home/disk/ssl/isaac-sim5.0/logs:/root/.nvidia-omniverse/logs
      - /home/disk/ssl/isaacsim_assets:/isaac-sim/isaacsim_assets:ro
      - /home/disk/ssl/models:/isaac-sim/models:ro
      - ./isaac-sim/frame_server.py:/workspace/frame_server.py:ro
    entrypoint: ""
    command: >
      bash -c "/isaac-sim/kit/python/bin/python3 -m pip install Pillow -q &&
               /isaac-sim/python.sh /workspace/frame_server.py"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    shm_size: 8gb
    ulimits:
      memlock: -1
      stack: 67108864
    restart: unless-stopped
